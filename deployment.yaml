apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmyshow-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookmyshow
  template:
    metadata:
      labels:
        app: bookmyshow
    spec:
      containers:
        - name: bookmyshow
          image: 583931059554.dkr.ecr.us-east-1.amazonaws.com/bookmyshow-app:latest
          ports:
            - containerPort: 80
